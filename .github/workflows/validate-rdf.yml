name: Validate RDF

on:
  pull_request:
    paths:
      - 'static/ontology/**'
      - 'Makefile'
      - '.github/workflows/validate-rdf.yml'
  push:
    branches:
      - main
    paths:
      - 'static/ontology/**'
      - 'Makefile'
      - '.github/workflows/validate-rdf.yml'

jobs:
  shacl:
    name: pySHACL validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pySHACL
        run: python -m pip install pyshacl

      - name: Run SHACL validation
        run: make validate
