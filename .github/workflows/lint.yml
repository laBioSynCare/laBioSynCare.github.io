name: Lint and Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  svelte:
    name: SvelteKit check and static build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Svelte checks
        run: npm run check

      - name: Build static site
        run: npm run build
